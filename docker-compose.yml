version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: soulapp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soulapp
    ports:
      - '5432:5432'
    volumes:
      - soulapp_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: soulapp-api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/soulapp
      JWT_SECRET: change_me
      JWT_EXPIRES_IN: 7d
      ADMIN_SIGNUP_SECRET: change_me
      APP_TIMEZONE: America/Montreal
    ports:
      - "3001:3001"
    depends_on:
      - postgres

volumes:
  soulapp_pgdata:
